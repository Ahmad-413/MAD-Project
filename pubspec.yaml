name: learn_loop
description: A student skill sharing app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2

  # UI & Fonts
  google_fonts: ^6.1.0
  animate_do: ^3.3.4
  smooth_page_indicator: ^1.1.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0
  firebase_storage: ^11.7.0

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Utils
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: NotoEmoji
      fonts:
        - asset: assets/fonts/NotoEmoji-VariableFont_wght.ttf